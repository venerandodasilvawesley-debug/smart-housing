version: "3.9"

services:
  db:
    image: postgres:15-alpine
    container_name: smart_housing_db
    restart: unless-stopped
    environment:

      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "rm$2020"
      POSTGRES_DB: smart_housing
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
      POSTGRES_USER: ${POSTGRES_USER:-wesley}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-troque_esta_senha}
      POSTGRES_DB: ${POSTGRES_DB:-smart_housing}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-wesley} -d ${POSTGRES_DB:-smart_housing}"]
      interval: 5s
      timeout: 5s
      retries: 10

api:
    build: .
    container_name: smart_housing_api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-wesley}:${POSTGRES_PASSWORD:-troque_esta_senha}@db:5432/${POSTGRES_DB:-smart_housing}
      SECRET_KEY: ${SECRET_KEY}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-60}
    ports:
      - "8000:8000"
    command: >
      sh -c "alembic upgrade head &&
             python seed.py &&
             uvicorn main:app --host 0.0.0.0 --port 8000"

volumes:
  pgdata: