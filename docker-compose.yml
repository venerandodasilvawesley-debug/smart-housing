version: "3.9"

services:
  db:
    image: postgres:15-alpine
    container_name: smart_housing_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "SENHA_REMOVIDA"
      POSTGRES_DB: smart_housing
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  api:
    build: .
    container_name: smart_housing_api
    restart: unless-stopped
    depends_on:
      - db
    environment:
      DATABASE_URL: 'postgresql+asyncpg://postgres:SENHA_REMOVIDA@db:5432/smart_housing'
      SECRET_KEY: ${SECRET_KEY}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-60}
    ports:
      - "8000:8000"
    command: >
      sh -c "alembic upgrade head &&
             python seed.py &&
             uvicorn main:app --host 0.0.0.0 --port 8000"

volumes:
  pgdata:
